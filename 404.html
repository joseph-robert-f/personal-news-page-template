<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:,">
<title>Page not found</title>
<!--
  Served by GitHub Pages for any missing path. Deliberately self-contained
  and static (no site.config.json fetch, no assets/site.js): a 404 can be
  reached from any depth or a broken relative path, so it must not depend on
  anything that might fail to resolve.
-->
<style>
  :root {
    --ink: #17181c;
    --muted: #6b7280;
    --line: #ececef;
    --bg: #ffffff;
    --accent: #2563eb;
    --link: #2563eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #e7e9ec;
      --muted: #9aa3ad;
      --line: #2b2e34;
      --bg: #101114;
      --link: #5b8def;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem 4rem;
    color: var(--ink); background: var(--bg); line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .masthead { margin-bottom: 2rem; }
  .eyebrow {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--link); margin-bottom: 0.4rem;
  }
  h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  p { color: var(--muted); }
  .links { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--line); }
  a {
    color: var(--link); text-decoration: none; font-weight: 500;
    margin-right: 1.25rem;
  }
  a:hover { text-decoration: underline; }
  a:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px;
  }
</style>
</head>
<body>
<header class="masthead">
  <div class="eyebrow">Daily Brief</div>
  <h1>Page not found</h1>
</header>
<p>The page you were looking for doesn&rsquo;t exist, or has moved.</p>
<p class="links">
  <a href="./">Latest digest</a>
  <a href="./archive.html">Archive</a>
</p>
</body>
</html>
