name: Create daily draft

on:
  schedule:
    # Two-cron + guard design: cron schedules run in UTC, but
    # site.config.json's timezone/publishTimeLocal is a local wall-clock
    # time whose UTC offset changes with DST. Rather than hand-editing this
    # cron whenever the config changes, we fire twice a day -- once for each
    # possible UTC offset of the configured local time (here, 06:30 America/
    # New_York: 10:30 UTC during EDT, 11:30 UTC during EST) -- and let the
    # "Guard" step below (scripts/should-run-now.mjs) decide which firing is
    # actually close to the configured time; the other one no-ops. PR CI
    # runs scripts/check-cron.mjs to make sure these two lines still bracket
    # the config; if you change timezone or publishTimeLocal to something
    # these lines no longer cover, that check fails with the correct lines
    # to paste in.
    - cron: "30 10 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional digest date in YYYY-MM-DD format"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    # The template repository itself keeps its schedule dormant -- scheduled
    # firings would only open pointless placeholder PRs here. Repositories
    # created from the template have a different name, so this condition is
    # true for them and their daily schedule works with no setup. Manual runs
    # (workflow_dispatch) work everywhere, including on the template.
    if: github.event_name != 'schedule' || github.repository != 'joseph-robert-f/personal-news-page-template'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REQUESTED_DATE: ${{ inputs.date }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Validate site config
        run: node scripts/validate-config.mjs
      - name: Guard
        id: guard
        run: node scripts/should-run-now.mjs ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}
      - name: Resolve publish mode
        if: steps.guard.outputs.should_run == 'true'
        run: |
          PUBLISH_MODE="$(node --input-type=module -e "import { loadSiteConfig } from './scripts/config.mjs'; const c = await loadSiteConfig(process.cwd()); console.log(c.publishMode);")"
          echo "PUBLISH_MODE=$PUBLISH_MODE" >> "$GITHUB_ENV"
          echo "Publish mode: $PUBLISH_MODE"
      - name: Resolve draft date and branch
        if: steps.guard.outputs.should_run == 'true'
        run: |
          if [ -n "$REQUESTED_DATE" ]; then
            DIGEST_DATE="$REQUESTED_DATE"
          else
            DIGEST_DATE="$(node scripts/new-digest.mjs --print-date)"
          fi
          # Validate DIGEST_DATE matches YYYY-MM-DD format
          if ! [[ "$DIGEST_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid digest date format: '$DIGEST_DATE'. Expected YYYY-MM-DD."
            exit 1
          fi
          DRAFT_BRANCH="$(node scripts/new-digest.mjs --date "$DIGEST_DATE" --print-branch)"
          DRAFT_PATH="$(node scripts/new-digest.mjs --date "$DIGEST_DATE" --print-path)"
          echo "DIGEST_DATE=$DIGEST_DATE" >> "$GITHUB_ENV"
          echo "DRAFT_BRANCH=$DRAFT_BRANCH" >> "$GITHUB_ENV"
          echo "DRAFT_PATH=$DRAFT_PATH" >> "$GITHUB_ENV"
      - name: Check out draft branch
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE != 'auto'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DRAFT_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$DRAFT_BRANCH"; then
            echo "DRAFT_REMOTE_EXISTS=true" >> "$GITHUB_ENV"
            git checkout -B "$DRAFT_BRANCH" "origin/$DRAFT_BRANCH"
            # Every later step runs scripts from this working tree, and a
            # reused draft branch may predate fixes merged to the default
            # branch since it was pushed. Fold main in so the current code
            # runs and the branch stays mergeable. A conflict here (rare:
            # the same digest edited on both sides) fails the run loudly,
            # which is the right outcome for a human to resolve.
            git merge --no-edit origin/main
          else
            echo "DRAFT_REMOTE_EXISTS=false" >> "$GITHUB_ENV"
            git checkout -b "$DRAFT_BRANCH"
          fi
      - name: Create draft digest
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE != 'auto'
        run: |
          node scripts/new-digest.mjs --date "$DIGEST_DATE"
          node scripts/build-manifest.mjs
      - name: Generate AI draft (optional)
        id: ai
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE != 'auto'
        env:
          # The API key is scoped to this single step only, so it never leaks
          # into other steps' environments or logs.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Scheduled firings are idempotent creators: with the guard's wide
          # catch-up window both daily firings can proceed, so the second one
          # must not regenerate (and re-bill) a draft that already exists.
          # Manual runs (workflow_dispatch) always regenerate on purpose.
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DRAFT_REMOTE_EXISTS" = "true" ] && ! git diff --quiet "origin/main...HEAD"; then
            echo "::notice::A draft for $DIGEST_DATE already exists on $DRAFT_BRANCH; this scheduled firing leaves it untouched."
            exit 0
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY is not set; keeping the placeholder draft."
            exit 0
          fi
          AI_ENABLED="$(node scripts/generate-digest.mjs --print-enabled)"
          if [ "$AI_ENABLED" != "true" ]; then
            echo "::notice::AI drafts are paused (ai.enabled is false in site.config.json); keeping the placeholder draft."
            exit 0
          fi
          set +e
          node scripts/generate-digest.mjs --date "$DIGEST_DATE"
          CODE=$?
          set -e
          case "$CODE" in
            0)
              # AI draft overwrote the placeholder file; refresh the manifest so
              # its title/summary reflect the generated content.
              node scripts/build-manifest.mjs
              echo "AI_DRAFT=true" >> "$GITHUB_ENV"
              ;;
            2)
              echo "::notice::AI draft skipped: ANTHROPIC_API_KEY missing at generation time (exit 2). Keeping the placeholder draft."
              ;;
            3)
              echo "::notice::AI draft skipped: generation failed after retries (exit 3). Keeping the placeholder draft."
              ;;
            *)
              echo "::notice::AI draft skipped: generate-digest exited $CODE. Keeping the placeholder draft."
              ;;
          esac
      - name: Commit draft if needed
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE != 'auto'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DRAFT_PATH" digests.json
          if git diff --cached --quiet; then
            echo "No draft changes to commit."
            echo "DRAFT_HAS_CHANGES=false" >> "$GITHUB_ENV"
            exit 0
          fi
          git commit -m "Add draft news digest for $DIGEST_DATE"
          git push --set-upstream origin "$DRAFT_BRANCH"
          echo "DRAFT_HAS_CHANGES=true" >> "$GITHUB_ENV"
      - name: Open draft pull request
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE != 'auto'
        run: |
          if [ "$DRAFT_HAS_CHANGES" != "true" ] && [ "$DRAFT_REMOTE_EXISTS" != "true" ]; then
            echo "No branch changes and no remote draft branch; skipping PR creation."
            exit 0
          fi
          # Only an OPEN pull request blocks creating one -- gh pr view also
          # matches the branch's merged/closed PRs (e.g. a draft for this
          # date that was already reviewed and merged), and those must not
          # swallow a fresh PR for new content.
          PR_STATE="$(gh pr view "$DRAFT_BRANCH" --json state --jq .state 2>/dev/null || true)"
          if [ "$PR_STATE" = "OPEN" ]; then
            echo "Draft pull request already exists for $DRAFT_BRANCH."
            exit 0
          fi
          # Nothing to propose if the branch has no content beyond main
          # (e.g. a fully-merged draft branch reused by a run whose
          # generation produced no changes) -- gh pr create would fail.
          if git diff --quiet "origin/main...HEAD"; then
            echo "Draft branch has no changes against main; skipping PR creation."
            exit 0
          fi
          cat > pr-body.md <<'EOF'
          Review this daily draft before merging.

          Checklist:
          - [ ] Replace placeholder bullets and story text.
          - [ ] Add source links for every substantive claim.
          - [ ] Keep the skim surface tight.
          - [ ] Confirm the title date and meta description.
          - [ ] Verify every AI-cited source link actually supports the claim.

          Merging this PR publishes the digest through the Pages workflow.
          EOF
          PR_TITLE="Draft news digest for $DIGEST_DATE"
          if [ "$AI_DRAFT" = "true" ]; then
            PR_TITLE="Draft news digest for $DIGEST_DATE (AI draft)"
          fi
          gh pr create \
            --draft \
            --title "$PR_TITLE" \
            --body-file pr-body.md
      - name: Generate and publish directly (auto mode)
        if: steps.guard.outputs.should_run == 'true' && env.PUBLISH_MODE == 'auto'
        env:
          # The API key is scoped to this single step only.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Auto mode publishes straight to main, but ONLY a generation that
          # fully succeeded (schema-valid payload, content linter clean --
          # generate-digest enforces both). Any failure publishes nothing:
          # the placeholder never goes live, and the guard's catch-up window
          # means a later scheduled firing retries (the file-exists check
          # below makes retries a no-op once the digest is published).
          # Manual runs regenerate on purpose, even if today's digest exists.
          if [ "${{ github.event_name }}" = "schedule" ] && [ -e "$DRAFT_PATH" ]; then
            echo "::notice::Digest for $DIGEST_DATE is already published; this scheduled firing leaves it untouched."
            exit 0
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::publishMode is 'auto' but ANTHROPIC_API_KEY is not set; auto mode has nothing to publish. Add the secret or switch publishMode back to 'review'."
            exit 0
          fi
          AI_ENABLED="$(node scripts/generate-digest.mjs --print-enabled)"
          if [ "$AI_ENABLED" != "true" ]; then
            echo "::notice::AI drafts are paused (ai.enabled is false in site.config.json); nothing published."
            exit 0
          fi
          set +e
          node scripts/generate-digest.mjs --date "$DIGEST_DATE"
          CODE=$?
          set -e
          if [ "$CODE" != "0" ]; then
            echo "::warning::AI generation failed (exit $CODE); nothing published for $DIGEST_DATE. A delayed scheduled firing today will retry."
            exit 0
          fi
          node scripts/build-manifest.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DRAFT_PATH" digests.json
          if git diff --cached --quiet; then
            echo "::notice::Generated digest is identical to what is already published; nothing to do."
            exit 0
          fi
          git commit -m "Publish news digest for $DIGEST_DATE (auto)"
          # Tolerate a racing push to main (rare): rebase once and retry.
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
